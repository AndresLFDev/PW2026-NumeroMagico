<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="css/output.css" rel="stylesheet">
</head>
<body class="m-0 p-0 h-56 bg-white min-h-screen flex flex-col items-center justify-center
            dark:bg-gray-900">
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        
        input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
    <header>
        <nav class="flex gap-4 bg-gray-50 p-4 rounded-full shadow-md mt-4 hover:shadow-lg hover:translate-y-1 transition duration-200  ease-in-out hover:scale-105 
            dark:bg-gray-800 dark:text-white">
            <button id="playAgainButton"
                class="cursor-pointer px-4 py-2 rounded-4xl hover:bg-green-400 hover:text-white  transition duration-200 ease-in-out 
                dark:hover:bg-green-700">Play Again</button>
            
            <button id="darkModeButton" 
                class="cursor-pointer px-4 py-2 rounded-4xl hover:bg-green-400 hover:text-white transition duration-200 ease-in-out
                dark:hover:bg-green-700">Dark Mode</button>
        </nav>
    </header>
    <main class="flex flex-col flex-1 items-center justify-center">
        <h1 class="text-5xl font-bold mb-10 dark:text-white">Magic Number</h1>
        <div class="flex flex-row items-center gap-4">
            <input id="numberInput" type="number" placeholder="Write a number" 
                class="border-4 border-green-500 rounded-2xl px-4 py-2 text-3xl text-center focus:outline-none focus:scale-105 transition duration-200 
                dark:bg-gray-800 dark:text-white dark:border-green-800  dark:focus:border-green-600"> 
            <button id="submitButton" 
                class="h-full px-6 py-3 font-bold bg-green-500 text-white rounded-2xl hover:bg-green-600 hover:scale-105 transition duration-200 
                dark:bg-green-800 dark:text-white dark:hover:bg-green-700">Check</button>   
        </div>
        <div id="history" class="mt-4 text-lg dark:text-white"></div>
    </main>
    <script src="./node_modules/sweetalert2/dist/sweetalert2.all.min.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
